databases:
  - name: upwork-jobsearch-db
    plan: basic-256mb
    databaseName: upwork_jobsearch
    user: upwork_jobsearch_user

services:
  - type: web
    name: upwork-jobsearch
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    customDomains:
      - upwork.doublemoon.biz
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: BASE_URL
        value: https://upwork.doublemoon.biz
      - key: DATABASE_URL
        fromDatabase:
          name: upwork-jobsearch-db
          property: connectionString
